# Aider configuration — see https://aider.chat/docs/config/aider_conf.html
read:
  - AGENTS.md
  - CONVENTIONS.md
auto-lint: true
lint-cmd: npm run lint
# Fast inner-loop command for Aider. Final completion still requires AGENTS.md: npm run qa,
# plus npm run qa:visual for UI/browser-facing work and npm run qa:strict before PR/release.
test-cmd: npm run test:agent
auto-commits: false
attribute-author: true
attribute-commit: true
