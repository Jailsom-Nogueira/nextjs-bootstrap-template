version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      types:
        patterns: ["@types/*"]
      next:
        patterns: ["next", "eslint-config-next", "@next/*"]
      testing:
        patterns: ["vitest", "@vitest/*", "@testing-library/*", "playwright", "@playwright/*"]
      linting:
        patterns: ["eslint*", "prettier*", "typescript-eslint"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
